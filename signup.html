<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Join FitHub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <form id="signupForm" class="signup-form">
    <h2>Join FitHub</h2>

    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" required />

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required />

    <label for="password">Create Password</label>
    <input type="password" id="password" name="password" required />

    <label for="membership">Choose Your Package</label>
    <select id="membership" name="membership" required>
      <option value="">-- Select --</option>
      <option value="basic">Basic – R299/month</option>
      <option value="premium">Premium – R499/month</option>
      <option value="elite">Elite – R799/month</option>
    </select>

    <label for="branch">Preferred Gym Branch</label>
    <select id="branch" name="branch" required>
      <option value="">-- Select --</option>
      <option value="sandton">Sandton</option>
      <option value="rosebank">Rosebank</option>
      <option value="midrand">Midrand</option>
      <option value="soweto">Soweto</option>
    </select>

    <label for="goals">Fitness Goals (optional)</label>
    <textarea id="goals" name="goals" rows="3" placeholder="Tell us what you’re working toward..."></textarea>

    <button type="submit">Sign Up</button>

    <div id="responseMessage" style="margin-top: 20px; font-size: 1.2rem;"></div>
  </form>

    <script>
  document.getElementById('signupForm').addEventListener('submit', function(e) {
    e.preventDefault(); // Prevent page reload

    // Optional: You can validate or log form data here if needed
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());
    console.log('Form submitted:', data);

    // Redirect to a confirmation page
    window.location.href = 'submitted.html'; // Make sure this page exists
  });
  </script>
</body>
</html>
